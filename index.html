<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahek Gopani - Creative Portfolio</title>
    <meta name="description" content="Creative Portfolio of Mahek Gopani, UI/UX Designer & Frontend Developer.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Cutive+Mono&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/collage-enhancements.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        /* Cover specific layout rules */
        body {
            background: #F4F1EA;
        }
    </style>
</head>

<body>
    <!-- Custom Cursor -->
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <!-- Sticky Navigation Bar -->
    <nav class="cover-sticky-nav" aria-label="Main navigation">
        <a href="index.html" class="cover-nav-logo">Mahek Gopani</a>
        <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu"
            aria-expanded="false"><span></span><span></span><span></span></button>
        <div class="cover-nav-links" id="cover-nav-links">
            <a href="about.html" class="cover-nav-link">About</a>
            <a href="ui-ux.html" class="cover-nav-link">UI/UX</a>
            <a href="social-media.html" class="cover-nav-link">Social Media</a>
            <a href="eduassist.html" class="cover-nav-link">AI Project</a>
            <a href="about.html#contact" class="cover-nav-link contact-link">Contact</a>
        </div>
    </nav>

    <!-- Main Cover Layout -->
    <main class="cover-layout">

        <!-- Circled Red Year Badge -->
        <div class="circled-year-badge">
            2026
        </div>

        <!-- Star Stickers Overlaid on Cover (Crumpled Silver Stars) -->
        <img src="assets/paper_star.png" alt="Star" class="paper-star-sticker star-1">
        <img src="assets/paper_star.png" alt="Star" class="paper-star-sticker star-2">
        <img src="assets/paper_star.png" alt="Star" class="paper-star-sticker star-3">
        <img src="assets/paper_star.png" alt="Star" class="paper-star-sticker star-4">

        <!-- Spidey Sticker on the Right Cover Side -->
        <img src="assets/spidey_sticker.png" alt="Spider-Man Sticker" class="spidey-sticker">

        <!-- Cover Center Layout (Torn slips text stack) -->
        <div class="cover-center">

            <div class="sticker-red-block">
                UI/UX & Design
            </div>

            <h1 class="giant-paper-slip">
                Portfolio
            </h1>

            <div class="slanted-paper-name">
                <span>of</span> Mahek Gopani
            </div>

        </div>

        <!-- Navigation Entries (Bottom Left) -->
        <div class="cover-links-group">
            <a href="about.html" class="cover-link-slip">About Me</a>
            <a href="ui-ux.html" class="cover-link-slip">UI/UX</a>
            <a href="social-media.html" class="cover-link-slip">Social Media</a>
            <a href="eduassist.html" class="cover-link-slip">AI Project</a>
        </div>

        <!-- Floating Zine Details Widget (Bottom Center) -->
        <div class="floating-zine-widget">
            <img src="profile.png" alt="Mahek Gopani">
            <div>
                <strong style="display: block; font-size: 0.8rem; line-height: 1;">Mahek Gopani</strong>
                <span style="font-size: 0.7rem; color: #888;">UI/UX Design</span>
            </div>
            <a href="https://www.linkedin.com/in/mahek-gopani-b34643249/" target="_blank"
                style="text-decoration: none;">
                <button class="btn-follow">+ Follow</button>
            </a>
        </div>

    </main>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>

</html>
